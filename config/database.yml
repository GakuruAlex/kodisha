# SQLite. Versions 3.8.0 and up are supported.
#   gem install pg
#
#   Ensure the postgres gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: kodisha_development


test:
  <<: *default
  database: kodisha_test

production:
  <<: *default
  database: kodisha_production
  username: <%= ENV['PGUSER'] %>
  password: <%= ENV['PGPASSWORD'] %>
